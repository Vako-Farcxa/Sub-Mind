services:
  - type: web
    name: submind-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build:backend && npm run prisma:migrate:deploy
    startCommand: npm run start -w backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: submind-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SAME_SITE
        value: none
      - key: COOKIE_SECURE
        value: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: REMINDER_JOB_ENABLED
        value: true
      - key: REMINDER_JOB_CRON
        value: "*/15 * * * *"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false

databases:
  - name: submind-db
    plan: free
    databaseName: submind
    user: submind
